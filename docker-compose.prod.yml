services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  frontend:
    image: ${FRONTEND_IMAGE}
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped

  backend:
    image: ${BACKEND_IMAGE}
    volumes:
      - bookmark-data:/data
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATA_DIR=/data
    restart: unless-stopped

volumes:
  bookmark-data:
