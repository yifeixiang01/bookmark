services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: /api
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    volumes:
      - bookmark-data:/data
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATA_DIR=/data
    restart: unless-stopped

volumes:
  bookmark-data:
