name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image names
        id: images
        run: |
          REPOSITORY_LC="$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')"
          echo "frontend=${REGISTRY}/${REPOSITORY_LC}/frontend" >> "$GITHUB_OUTPUT"
          echo "backend=${REGISTRY}/${REPOSITORY_LC}/backend" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Validate backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Validate deployment secrets
        run: |
          test -n "${{ secrets.SERVER_HOST }}" || (echo "Missing secret: SERVER_HOST" && exit 1)
          test -n "${{ secrets.SERVER_USER }}" || (echo "Missing secret: SERVER_USER" && exit 1)
          test -n "${{ secrets.SERVER_SSH_KEY }}${{ secrets.SERVER_PASSWORD }}" || (echo "Missing secret: SERVER_SSH_KEY or SERVER_PASSWORD" && exit 1)
          test -n "${{ secrets.SERVER_APP_DIR }}" || (echo "Missing secret: SERVER_APP_DIR" && exit 1)
          test -n "${{ secrets.GHCR_TOKEN }}" || (echo "Missing secret: GHCR_TOKEN" && exit 1)

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.images.outputs.frontend }}:latest
            ${{ steps.images.outputs.frontend }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=/api

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.images.outputs.backend }}:latest
            ${{ steps.images.outputs.backend }}:${{ github.sha }}

      - name: Prepare deploy directory
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          timeout: 30s
          command_timeout: 2m
          script: |
            sudo mkdir -p "${{ secrets.SERVER_APP_DIR }}/deploy/nginx"
            sudo chown -R "$(id -un):$(id -gn)" "${{ secrets.SERVER_APP_DIR }}"

      - name: Copy deployment files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          timeout: 30s
          command_timeout: 2m
          source: "docker-compose.prod.yml,deploy/nginx/default.conf"
          target: ${{ secrets.SERVER_APP_DIR }}

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.2
        env:
          FRONTEND_IMAGE: ${{ steps.images.outputs.frontend }}:latest
          BACKEND_IMAGE: ${{ steps.images.outputs.backend }}:latest
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          HTTP_PORT: ${{ vars.HTTP_PORT || '8080' }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          timeout: 30s
          command_timeout: 70m
          envs: FRONTEND_IMAGE,BACKEND_IMAGE,GHCR_USERNAME,GHCR_TOKEN,HTTP_PORT
          script: |
            set -e
            cd "${{ secrets.SERVER_APP_DIR }}"
            cat > .env <<EOF
            FRONTEND_IMAGE=$FRONTEND_IMAGE
            BACKEND_IMAGE=$BACKEND_IMAGE
            HTTP_PORT=$HTTP_PORT
            EOF
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

            pull_ok=0
            for attempt in 1 2 3; do
              echo "Pulling deployment images, attempt $attempt/3"
              if timeout 20m docker compose -f docker-compose.prod.yml pull; then
                pull_ok=1
                break
              fi
              echo "Image pull failed or timed out, retrying in 20 seconds..."
              sleep 20
            done
            test "$pull_ok" = "1"

            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
